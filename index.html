<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>B N Ø</title>

  <style>
    :root { color-scheme: dark; }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#0b0b0b;
      color:#f2f2f2;
      font-family: Arial, sans-serif;
      letter-spacing:0.08em;
    }

    .wrap{
      width:min(720px, 92vw);
      text-align:center;
      padding:48px 0;
    }

    .logo{
      font-size: clamp(48px, 10vw, 96px);
      font-weight:700;
      margin: 0;
    }

    .sub{
      margin-top:14px;
      font-size:14px;
      opacity:0.8;
      font-weight:700;
    }

    .line{
      margin: 28px auto;
      width: 72px;
      height: 1px;
      background:#2a2a2a;
    }

    .text{
      font-size:18px;
      font-weight:700;
      text-transform:uppercase;
    }

    /* Box um das Brevo-Formular */
    .formBox{
      margin: 28px auto 0;
      width: min(620px, 92vw);
      padding: 22px;
      border: 1px solid #2a2a2a;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      text-align:left;
      letter-spacing: normal;
      font-family: Arial, sans-serif;
    }

    /* ====== DEIN "BNO Premium Form Styling" kommt HIER rein ======
       WICHTIG: Nur hier im <head> in diesem <style> – NICHT irgendwo unten im <body>
    */
    /*
    #sib-container, .sib-form, .sib-container--large { ... }
    */
  </style>
</head>

<body>
  <main class="wrap">
    <div class="logo">B N Ø</div>
    <div class="sub">NICHT FÜR JEDEN.</div>
    <div class="line"></div>

    <div class="text">FRÜHER ZUGANG. ODER GAR NICHT.</div>

    <div class="formBox">
      <!-- =========================
           HIER kommt dein Brevo "Einfaches HTML" Formular rein
           (NICHT "Iframe", sondern "Einfaches HTML")
           ========================= -->

    <div class="line"></div>
    <div class="sub">Trag dich ein und wir melden uns, sobald Drop/Shop live ist.</div>

</html>
