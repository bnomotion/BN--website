<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>B N Ø</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: #0b0b0b; color: #f2f2f2; font-family: Arial, sans-serif;
      letter-spacing: 0.08em;
    }
    .wrap { width: min(720px, 92vw); text-align: center; padding: 48px 0; }
    .logo { font-size: clamp(48px, 10vw, 96px); font-weight: 700; }
    .sub { margin-top: 14px; font-size: 14px; opacity: 0.8; }
    .line { margin: 28px auto; width: 72px; height: 1px; background: #2a2a2a; }
    .text { font-size: 18px; font-weight: 700; text-transform: uppercase; }
    form { margin-top: 28px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    input {
      background: transparent; border: 1px solid #2a2a2a; color: #f2f2f2;
      padding: 12px 14px; width: min(360px, 92vw); outline: none;
    }
    button {
      background: #f2f2f2; color: #0b0b0b; border: 0; padding: 12px 16px;
      font-weight: 700; cursor: pointer;
    }
    .tiny { margin-top: 16px; font-size: 12px; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">B N Ø</div>
    <div class="sub">NICHT FÜR JEDEN.</div>
    <div class="line"></div>

    <div class="text">Früher Zugang. Oder gar nicht.</div>

    <!-- Kostenlos: Formular macht erstmal nichts. Später kann man Mailchimp/Brevo verbinden -->
    <form onsubmit="event.preventDefault(); alert('Eingetragen.');">
      <input type="email" placeholder="deine@email.de" required />
      <button type="submit">ANMELDEN</button>
    </form>

    <div class="tiny">ZUGANG NUR MIT PASSWORT.</div>
  </div>
</body>
</html>
